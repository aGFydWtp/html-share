<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>upload — html-share</title>
<style>
  :root{
    color-scheme:light;
    --bg:#f6f6f3; --panel:#fff; --ink:#1b1b18; --muted:#70706a; --line:#e4e4de;
    --accent:#38618c; --accent-soft:#eef2f7; --danger:#a23b3b; --ok:#3a6b4a;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,system-ui,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    --radius:8px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{font-size:14px;font-weight:600;color:var(--ink);text-decoration:none;letter-spacing:-.2px;font-family:var(--mono)}
  .brand::before{content:"$ ";color:var(--muted)}
  .nav{display:flex;gap:18px;font-family:var(--mono);font-size:13px}
  .nav a{color:var(--muted);text-decoration:none}
  .nav a:hover{color:var(--accent)}
  main{max-width:560px;margin:0 auto;padding:48px 20px}
  h1{font-size:21px;font-weight:650;margin:0 0 6px;letter-spacing:-.3px}
  .sub{font-size:13.5px;color:var(--muted);margin:0 0 24px}
  #drop{border:1.5px dashed var(--line);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;background:var(--panel);transition:border-color .15s,background .15s}
  #drop:hover,#drop.over{border-color:var(--accent);background:var(--accent-soft)}
  #drop svg{width:28px;height:28px;color:var(--muted)}
  #drop .hint{font-size:14px;margin-top:12px}
  #drop .note{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px}
  #file{display:none}
  .filename{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:12px;min-height:18px}
  .bar2{height:4px;border-radius:2px;background:var(--line);overflow:hidden;margin-top:18px;display:none}
  .bar2>span{display:block;height:100%;width:0;background:var(--accent);transition:width .15s}
  .result,.error{margin-top:20px;display:none}
  .result{padding:16px;border-radius:var(--radius);border:1px solid var(--line);background:var(--panel)}
  .result .ttl{font-size:13px;font-weight:600;color:var(--ok)}
  .result a{display:block;word-break:break-all;font-family:var(--mono);font-size:13px;color:var(--accent);text-decoration:none;margin-top:10px}
  .result .row{display:flex;gap:8px;align-items:center;margin-top:14px}
  .result .note{font-size:12px;color:var(--muted);margin-top:12px}
  .error{padding:13px 16px;border-radius:var(--radius);border:1px solid #e6cfcf;background:#fbf4f4;font-size:13.5px;color:var(--danger)}
  button{font:inherit;font-size:13px;padding:7px 13px;border-radius:6px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;white-space:nowrap}
  button:hover{background:var(--accent-soft)}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  button.primary:hover{opacity:.88;background:var(--ink)}
</style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="/">html-share</a>
    <nav class="nav"><a href="/upload">upload</a><a href="/mypage">mypage</a></nav>
  </header>

  <main>
    <h1>HTML を共有</h1>
    <p class="sub">単一の HTML ファイルをアップロードすると、社内限定の共有 URL が発行されます。</p>

    <div id="drop" tabindex="0" role="button" aria-label="ファイルを選択またはドロップ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4 7 9M12 4l5 5M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg>
      <div class="hint"><strong>クリック</strong>して選択、または<strong>ドラッグ＆ドロップ</strong></div>
      <div class="note">.html / .htm · 25MB まで</div>
    </div>
    <input type="file" id="file" accept=".html,.htm">
    <div class="filename" id="filename"></div>

    <div class="bar2" id="bar"><span id="barfill"></span></div>

    <div class="result" id="result">
      <div class="ttl">アップロード完了</div>
      <a id="url" href="#" target="_blank" rel="noopener"></a>
      <div class="row">
        <button id="copy" class="primary">URL をコピー</button>
        <button id="again">続けてアップロード</button>
      </div>
      <div class="note">反映まで数秒かかる場合があります。404 のときは少し待って再読み込みしてください。</div>
    </div>

    <div class="error" id="error"></div>
  </main>

<script>
(function () {
  const drop = document.getElementById('drop');
  const input = document.getElementById('file');
  const filename = document.getElementById('filename');
  const bar = document.getElementById('bar');
  const barfill = document.getElementById('barfill');
  const result = document.getElementById('result');
  const urlEl = document.getElementById('url');
  const errEl = document.getElementById('error');
  const copyBtn = document.getElementById('copy');
  const againBtn = document.getElementById('again');

  function reset() {
    result.style.display = 'none';
    errEl.style.display = 'none';
    bar.style.display = 'none';
    barfill.style.width = '0';
  }
  function showError(msg) {
    reset();
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  drop.addEventListener('click', () => input.click());
  drop.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); } });

  ['dragenter', 'dragover'].forEach(ev =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('over'); }));
  ['dragleave', 'drop'].forEach(ev =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('over'); }));

  drop.addEventListener('drop', (e) => {
    const f = e.dataTransfer.files[0];
    if (f) upload(f);
  });
  input.addEventListener('change', () => {
    if (input.files[0]) upload(input.files[0]);
  });

  function upload(file) {
    reset();
    const lower = file.name.toLowerCase();
    if (!lower.endsWith('.html') && !lower.endsWith('.htm')) {
      return showError('.html / .htm のみアップロードできます');
    }
    if (file.size > 25 * 1024 * 1024) {
      return showError('ファイルが大きすぎます（上限 25MB）');
    }
    filename.textContent = file.name + '（' + Math.ceil(file.size / 1024) + ' KB）';

    const fd = new FormData();
    fd.append('file', file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', 'upload');
    bar.style.display = 'block';
    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) barfill.style.width = (e.loaded / e.total * 100) + '%';
    });
    xhr.addEventListener('load', () => {
      bar.style.display = 'none';
      let data = {};
      try { data = JSON.parse(xhr.responseText); } catch (_) {}
      if (xhr.status === 200 && data.url) {
        urlEl.textContent = data.url;
        urlEl.href = data.url;
        result.style.display = 'block';
      } else {
        showError(data.error || ('アップロードに失敗しました（HTTP ' + xhr.status + '）'));
      }
    });
    xhr.addEventListener('error', () => showError('通信エラーが発生しました'));
    xhr.send(fd);
  }

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(urlEl.textContent);
      copyBtn.textContent = 'コピーしました';
      setTimeout(() => (copyBtn.textContent = 'URL をコピー'), 1500);
    } catch (_) {
      showError('クリップボードへのコピーに失敗しました。URL を手動で選択してください。');
    }
  });
  againBtn.addEventListener('click', () => {
    reset();
    input.value = '';
    filename.textContent = '';
  });
})();
</script>
</body>
</html>
