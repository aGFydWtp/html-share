<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — html-share</title>
<style>
  :root{
    color-scheme:light;
    --bg:#f6f6f3; --panel:#fff; --ink:#1b1b18; --muted:#70706a; --line:#e4e4de;
    --accent:#38618c; --accent-soft:#eef2f7;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,system-ui,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    --radius:8px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel)}
  .brand{font-size:14px;font-weight:600;color:var(--ink);text-decoration:none;letter-spacing:-.2px;font-family:var(--mono)}
  .brand::before{content:"$ ";color:var(--muted)}
  .nav{display:flex;gap:18px;font-family:var(--mono);font-size:13px}
  .nav a{color:var(--muted);text-decoration:none}
  .nav a:hover{color:var(--accent)}
  main{max-width:680px;margin:0 auto;padding:72px 20px}
  .code{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.1em}
  h1{font-size:21px;font-weight:650;margin:8px 0 8px;letter-spacing:-.3px}
  p{color:var(--muted);margin:0 0 24px;max-width:48ch}
  .btn{display:inline-flex;align-items:center;gap:8px;font:inherit;font-size:14px;padding:9px 16px;border-radius:var(--radius);border:1px solid var(--ink);background:var(--ink);color:#fff;text-decoration:none}
  .btn:hover{opacity:.88}
</style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="/">html-share</a>
    <nav class="nav"><a href="/upload">upload</a><a href="/mypage">mypage</a></nav>
  </header>

  <main>
    <div class="code">404 NOT FOUND</div>
    <h1>ページが見つかりません</h1>
    <p>この共有ページは存在しないか、すでに削除されています。アップロード直後なら、数秒おいて再読み込みすると表示されることがあります。</p>
    <a class="btn" href="/">トップへ戻る</a>
  </main>
</body>
</html>
