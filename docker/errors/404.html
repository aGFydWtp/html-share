<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ページが見つかりません — html-share</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, "Hiragino Sans", sans-serif; margin:0; min-height:100vh;
         display:grid; place-items:center; background:#0f1115; color:#e6e8eb; }
  .card { text-align:center; padding:3rem 2rem; max-width:520px; }
  .code { font-size:5rem; font-weight:800; letter-spacing:-2px; line-height:1;
          background:linear-gradient(135deg,#6ea8fe,#a78bfa); -webkit-background-clip:text;
          background-clip:text; color:transparent; }
  h1 { font-size:1.4rem; margin:.6rem 0 1rem; }
  p { color:#9aa0a6; line-height:1.7; margin:.3rem 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>ページが見つかりません</h1>
    <p>この共有ページは存在しないか、すでに削除されています。</p>
    <p>URL を確認するか、共有元に再発行を依頼してください。</p>
  </div>
</body>
</html>
