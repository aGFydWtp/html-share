server {
    listen       8080;
    server_name  _;

    # nginx バージョン等の情報露出を抑止（Server ヘッダ/エラーページから版数を消す）
    server_tokens off;

    # GCS volume mount のマウント先
    root  /srv/share;
    index index.html;

    # アップロード受信は localhost:8081 の Go サイドカーへ委譲（W3/W7）。
    # ID は [0-9a-f]{8} なので prefix "/upload" と衝突しない。
    location /upload {
        client_max_body_size 26m;          # 25MB 上限 + multipart 余白
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;        # 返却 URL 導出用（W13）
        proxy_request_buffering off;        # 大きめファイルをストリーム転送
        proxy_read_timeout 120s;
    }

    # 自分の共有一覧/削除も同じ Go サイドカーへ。IAP の認証ヘッダ
    # (X-Goog-Authenticated-User-Email) は proxy で消さず透過＝本人特定に使う。
    location /mypage {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    # トップは社内向け紹介ページ（イメージ焼き込み・"/" 完全一致のみ）。
    # 完全一致 location なので /<id>/ や /upload には影響しない。ID は [0-9a-f]{8} で衝突なし。
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
    }

    # /<id>/ -> <id>/index.html、配下は相対パスで配信
    location / {
        try_files $uri $uri/ =404;
    }

    # カスタム 404（イメージに焼き込んだページ）
    error_page 404 /404.html;
    location = /404.html {
        root     /usr/share/nginx/errors;
        internal;
    }
}
